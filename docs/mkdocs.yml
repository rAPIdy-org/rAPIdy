site_name: rAPIdy
repo_name: daniil-grois/rAPIdy
repo_url: https://github.com/daniil-grois/rAPIdy

theme:
  logo: assets/logo.png
  favicon: assets/logo.png
  name: material
  palette:
  - media: '(prefers-color-scheme: dark)'
    scheme: default
    primary: deep purple
    accent: deep purple
    toggle:
      icon: material/weather-night
      name: Switch to dark mode
  - media: '(prefers-color-scheme: light)'
    scheme: slate
    primary: deep purple
    accent: deep purple
    toggle:
      icon: material/weather-sunny
      name: Switch to light mode
  features:
    # navigation
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.expand
    - navigation.top
    - toc.follow

    # search
    - search.suggest
    - search.highlight
    - search.share

    # content
    - content.tabs.link
    - content.tooltips  # вот с этим разобраться  https://squidfunk.github.io/mkdocs-material/reference/tooltips/?h=tooltips

    # content.code
    - content.code.annotate  # аннотации к коду https://squidfunk.github.io/mkdocs-material/reference/code-blocks/?h=code#__codelineno-4-1
    - content.code.copy
    - content.code.select

    # https://squidfunk.github.io/mkdocs-material/reference/data-tables/ - таблицы данных
    # https://squidfunk.github.io/mkdocs-material/reference/diagrams/ - диаграммы
    # https://squidfunk.github.io/mkdocs-material/reference/lists/ - списки и тд
plugins:
  - search
  - mike:
      # These fields are all optional; the defaults are as below...
      alias_type: symlink
      redirect_template: null
      deploy_prefix: ''
      canonical_version: latest
      version_selector: true
      css_dir: css
      javascript_dir: js
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
#          default: true  # TODO
          name: English
          link: /
          build: true
        - locale: ru
          default: true
          name: Русский
          link: /ru/
          build: true

extra_css: [extra.css]

extra:
  version:
    provider: mike  # TODO: донастроить версионирование
    default: latest
    # https://squidfunk.github.io/mkdocs-material/setup/setting-up-versioning/#publishing-a-new-version
    # https://github.com/jimporter/mike

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - mdx_include:
      base_path: ./examples

nav:
- rAPIdy: index.md
- quickstart.md
- examples.md
- Docs:
    - docs/introduction.md
    - HTTP Server:
        - Request:
            - docs/server/request/ext_and_validate.md
            - docs/server/request/annotation.md
            - Parameters:
                - docs/server/request/parameters/path.md
                - docs/server/request/parameters/headers.md
                - docs/server/request/parameters/cookies.md
                - docs/server/request/parameters/query.md
                - docs/server/request/parameters/body.md
            - docs/server/request/default.md
            - docs/server/request/validation_errors.md
        - Response:
          - docs/server/response/index.md
        - Handlers:
            - docs/server/handlers/functional.md
            - docs/server/handlers/class_based_view.md
            - docs/server/handlers/middlewares.md
        - Lifespan:
            - docs/server/lifespan/index.md
        - Advanced Usages:
            - Raw request management:
                - docs/server/advanced_usages/raw_request_management/request.md
                - docs/server/advanced_usages/raw_request_management/response.md
            - docs/server/advanced_usages/tips_and_tricks.md
    - HTTP Client:
        - docs/client/index.md

#    - For Beginners:
#        - docs/beginners/index.md
#    - docs/dynamic_routes.md
#    - docs/default_values.md
#    - docs/raw_data.md
#    - docs/named_resources.md
- about.md
- contributing.md
